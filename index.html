<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex Supreme Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Libre+Baskerville:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        .sig-font { font-family: 'Dancing Script', cursive; }
        .header-font { font-family: 'Cinzel', serif; }
        .body-font { font-family: 'Libre Baskerville', serif; }
    </style>
</head>
<body class="bg-[#111] p-6 body-font text-zinc-300">

<div id="app" class="max-w-[1800px] mx-auto grid lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 bg-zinc-900 p-8 rounded-xl border border-zinc-800 h-[92vh] overflow-y-auto">
        <h1 class="header-font text-xl text-amber-600 mb-6 border-b border-zinc-800 pb-4">LEX_SUPREME_CORE_V5</h1>
        
        <div class="space-y-4">
            <input type="file" @change="handleLogoUpload" class="block w-full text-xs text-zinc-500 bg-zinc-950 p-2 rounded border border-zinc-800">

            <select v-model="selectedTemplate" class="w-full p-3 bg-zinc-950 border border-zinc-800 rounded text-amber-500 font-bold outline-none">
                <option v-for="t in templates" :value="t">{{ t.name }}</option>
            </select>

            <div class="grid gap-3 pt-4">
                <div v-for="field in selectedTemplate.fields" :key="field">
                    <label class="text-[9px] uppercase font-bold text-zinc-500">{{ field }}</label>
                    <input type="text" v-model="formData[field]" class="w-full p-2 bg-zinc-950 border border-zinc-800 rounded outline-none focus:border-amber-600 text-white">
                </div>
            </div>

            <button @click="generatePDF" class="w-full bg-amber-600 hover:bg-amber-500 text-black font-black py-4 rounded header-font mt-4">
                EXECUTE_PDF
            </button>
        </div>
    </div>

    <div class="lg:col-span-8 bg-white p-20 relative text-black min-h-[1100px] shadow-2xl overflow-y-auto max-h-[92vh]">
        <div class="absolute left-12 top-10 bottom-10 w-[1.5px] bg-red-700 opacity-40"></div>
        
        <div class="relative z-10 px-10">
            <div class="text-center mb-10">
                <img v-if="customLogo" :src="customLogo" class="w-28 h-28 mx-auto mb-4 object-contain">
                <h3 class="header-font text-3xl font-black border-b-2 border-black pb-2">INSTRUMENT OF RECORD</h3>
            </div>

            <h2 class="text-xl text-center font-bold uppercase mb-8 bg-zinc-50 py-2">{{ selectedTemplate.name }}</h2>
            <div class="text-[18px] leading-[1.8] text-justify mb-20 whitespace-pre-line">{{ processedBody }}</div>

            <div class="grid grid-cols-2 gap-20 pt-10 border-t-2 border-zinc-200 relative mt-20">
                <div class="text-center">
                    <div class="sig-font text-5xl h-16">{{ formData['Primary_Signer'] }}</div>
                    <div class="border-t-2 border-black pt-1 text-[10px] font-bold">PRIMARY DECLARANT</div>
                </div>
                <div class="text-center">
                    <div class="sig-font text-5xl h-16">{{ formData['Witness_Signer'] }}</div>
                    <div class="border-t-2 border-black pt-1 text-[10px] font-bold">ATTESTING WITNESS</div>
                </div>
                <div class="absolute left-1/2 top-0 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full border-4 border-double border-red-800/20 flex items-center justify-center text-center -rotate-12 bg-white/80">
                    <span class="header-font text-[8px] font-black text-red-800/60">VALIDATED<br>ORIGINAL</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
const { jsPDF } = window.jspdf;

createApp({
    data() {
        return {
            customLogo: null,
            selectedTemplate: null,
            formData: { Primary_Signer: '', Witness_Signer: '' },
            templates: [
                {
                    name: "Irrevocable Private Trust Indenture",
                    fields: ["Settlor_Name", "Trustee_Name", "Trust_Name", "Asset_Schedule", "Jurisdiction", "Primary_Signer", "Witness_Signer"],
                    body: `This INDENTURE OF TRUST is established by {{Settlor_Name}} as Settlor and {{Trustee_Name}} as Trustee for the {{Trust_Name}}.\n\nThe Settlor hereby transfers the following assets: {{Asset_Schedule}} to the Trust. This Trust is irrevocable and the assets are held for the benefit of the beneficiaries as defined in the private ledger under the jurisdiction of {{Jurisdiction}}.\n\nThe Trustee has full authority to manage and protect the trust property under the common law. This instrument serves as a final transfer of ownership and control, binding upon all heirs and assigns forever.`
                },
                {
                    name: "Commercial Lien & Affidavit of Obligation",
                    fields: ["Debtor_Name", "Claimant_Name", "Lien_Value", "Specific_Breach", "Primary_Signer", "Witness_Signer"],
                    body: `NOTICE TO THE PRINCIPAL IS NOTICE TO THE AGENT. A commercial lien is hereby placed against {{Debtor_Name}} by the Claimant, {{Claimant_Name}}, for the amount of {{Lien_Value}}.\n\nThis claim arises from the following breach: {{Specific_Breach}}. This document serves as a verified affidavit of truth. Failure to rebut this claim point-for-point within 30 days shall constitute an admission of fault and a final judgment in commerce.`
                },
                {
                    name: "Deed of Allodial Title",
                    fields: ["Grantee_Name", "Parcel_Coordinates", "Land_Description", "Jurisdiction", "Primary_Signer", "Witness_Signer"],
                    body: `I, {{Grantee_Name}}, hereby declare an Absolute Allodial Title for the parcel described as {{Land_Description}} (Ref: {{Parcel_Coordinates}}).\n\nThis conveyance is independent of any corporate or statutory superior. I claim absolute dominion over the soil, water, and minerals within this estate in the jurisdiction of {{Jurisdiction}}. No property tax or statutory encumbrance shall be recognized without express written consent.`
                },
                {
                    name: "Diplomatic Immunity Certification",
                    fields: ["Envoy_Name", "Mission_Body", "ID_Reference", "Jurisdiction", "Primary_Signer", "Witness_Signer"],
                    body: `This certifies that {{Envoy_Name}} is a representative of the {{Mission_Body}}.\n\nUnder international law, the bearer (Ref: {{ID_Reference}}) is entitled to full diplomatic immunity. All administrative agencies are commanded to allow safe passage across {{Jurisdiction}}. The bearer's person and property are inviolable and exempt from search or detention.`
                },
                {
                    name: "Durable Power of Attorney",
                    fields: ["Principal_Name", "Agent_Name", "Powers_Detailed", "Date_Effective", "Primary_Signer", "Witness_Signer"],
                    body: `I, {{Principal_Name}}, appoint {{Agent_Name}} as my Attorney-in-Fact starting {{Date_Effective}}.\n\nMy Agent shall have the power to: {{Powers_Detailed}}. This power is DURABLE and shall survive any period of incapacity. No third party shall be liable for following the instructions of my Agent.`
                },
                {
                    name: "Absolute Bill of Sale (Vessel)",
                    fields: ["Seller_Name", "Buyer_Name", "Hull_ID", "Sale_Price", "Primary_Signer", "Witness_Signer"],
                    body: `For the sum of {{Sale_Price}}, {{Seller_Name}} hereby sells the vessel (Hull ID: {{Hull_ID}}) to {{Buyer_Name}}.\n\nThe vessel is sold free and clear of all maritime liens. The Seller warrants they are the sole owner with the right to convey this property. This transaction is governed by the International Laws of the Sea.`
                },
                {
                    name: "Apostille Authentication",
                    fields: ["Document_Title", "Official_Signatory", "Auth_Number", "City_of_Issue", "Primary_Signer", "Witness_Signer"],
                    body: `This certificate verifies the signature and seal of {{Official_Signatory}} who executed the document {{Document_Title}}.\n\nThis authentication (No. {{Auth_Number}}) is issued in {{City_of_Issue}} in accordance with the Hague Convention. This certifies the capacity of the signatory and the authenticity of the seal affixed thereto.`
                }
            ]
        }
    },
    created() { this.selectedTemplate = this.templates[0]; },
    computed: {
        processedBody() {
            let text = this.selectedTemplate.body;
            this.selectedTemplate.fields.forEach(f => {
                text = text.replace(new RegExp(`{{${f}}}`, 'g'), this.formData[f] || `[ ${f.replace(/_/g, ' ')} ]`);
            });
            return text;
        }
    },
    methods: {
        handleLogoUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (f) => { this.customLogo = f.target.result; };
            reader.readAsDataURL(file);
        },
        generatePDF() {
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            const pageW = 210; const margin = 35; // Wide left margin for red line
            let cursorY = 70;

            const drawShell = (d) => {
                d.setDrawColor(180, 0, 0); d.setLineWidth(0.5); d.line(28, 15, 28, 282); // Red margin line
            };

            drawShell(doc);
            if (this.customLogo) doc.addImage(this.customLogo, 'PNG', 90, 15, 30, 30);
            
            doc.setFont("times", "bold"); doc.setFontSize(26);
            doc.text("INSTRUMENT OF RECORD", 105, 60, { align: "center" });
            
            doc.setFontSize(14);
            doc.text(this.selectedTemplate.name.toUpperCase(), 105, 75, { align: "center" });

            doc.setFont("times", "normal"); doc.setFontSize(14); // Larger professional font
            const lines = doc.splitTextToSize(this.processedBody, 145);
            
            // Text rendering with cursor tracking
            lines.forEach(line => {
                if (cursorY > 250) { doc.addPage(); drawShell(doc); cursorY = 30; }
                doc.text(line, margin, cursorY, { align: 'justify' });
                cursorY += 8.5; // Line spacing
            });

            // Signature Logic: Ensure it doesn't overlap the text
            let sigY = cursorY + 30;
            if (sigY > 250) { doc.addPage(); drawShell(doc); sigY = 50; }

            doc.setDrawColor(0); doc.setLineWidth(0.5);
            // Signatures
            doc.setTextColor(0, 0, 128); doc.setFont("times", "italic"); doc.setFontSize(24);
            doc.text(this.formData.Primary_Signer || "", margin, sigY);
            doc.text(this.formData.Witness_Signer || "", 115, sigY);
            // Underlines
            doc.line(margin, sigY + 2, 95, sigY + 2);
            doc.line(115, sigY + 2, 185, sigY + 2);
            // Labels
            doc.setTextColor(0); doc.setFont("times", "bold"); doc.setFontSize(9);
            doc.text("PRIMARY DECLARANT", margin, sigY + 7);
            doc.text("ATTESTING WITNESS", 115, sigY + 7);

            // Centered Red Seal
            doc.setDrawColor(150, 0, 0); doc.circle(105, sigY - 5, 15);
            doc.setFontSize(6); doc.setTextColor(150, 0, 0);
            doc.text("OFFICIAL SEAL", 105, sigY - 5, {align: "center"});

            doc.save(`${this.selectedTemplate.name}.pdf`);
        }
    }
}).mount('#app');
</script>
</body>
</html>
