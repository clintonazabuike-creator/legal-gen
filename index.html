<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex Supreme - Final Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Libre+Baskerville:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        .sig-font { font-family: 'Dancing Script', cursive; }
        .header-font { font-family: 'Cinzel', serif; }
        .body-font { font-family: 'Libre Baskerville', serif; }
        .paper-bond { background-color: #ffffff; }
    </style>
</head>
<body class="bg-zinc-200 min-h-screen p-4 body-font text-zinc-900">

<div id="app" class="max-w-[1700px] mx-auto grid lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 bg-white p-8 rounded-2xl shadow-2xl h-[92vh] overflow-y-auto border border-zinc-300">
        <h1 class="header-font text-2xl text-red-800 mb-6 font-black text-center border-b pb-4">LEX SUPREME</h1>
        
        <div class="space-y-5">
            <section class="p-4 bg-zinc-50 border-2 border-dashed border-zinc-300 rounded-xl text-center">
                <input type="file" @change="handleLogoUpload" class="hidden" id="logoUpload" accept="image/*">
                <label for="logoUpload" class="cursor-pointer text-zinc-500 text-xs font-bold uppercase block">
                    {{ customLogo ? 'Logo Active' : 'Upload Authority Seal' }}
                </label>
            </section>

            <select v-model="selectedTemplate" class="w-full p-4 bg-white border border-zinc-400 rounded-xl font-bold">
                <option v-for="t in templates" :value="t">{{ t.name }}</option>
            </select>

            <div class="space-y-4 pt-4 border-t">
                <div v-for="field in selectedTemplate.fields" :key="field">
                    <label class="block text-[10px] font-black text-zinc-400 uppercase mb-1">{{ field.replace(/_/g, ' ') }}</label>
                    <input type="text" v-model="formData[field]" class="w-full p-3 bg-zinc-50 border border-zinc-300 rounded-lg outline-none focus:border-red-800">
                </div>
            </div>

            <button @click="generatePDF" class="w-full bg-zinc-900 hover:bg-black text-white font-black py-5 rounded-xl shadow-xl transition-all text-lg header-font uppercase">
                Download PDF
            </button>
        </div>
    </div>

    <div class="lg:col-span-8 bg-white paper-bond p-16 relative text-black min-h-[1100px] shadow-2xl overflow-y-auto max-h-[92vh]">
        <div class="absolute left-10 top-10 bottom-10 w-[2px] bg-red-700 opacity-50"></div>

        <div class="relative z-10 px-10">
            <div class="flex flex-col items-center mb-10 text-center">
                <img v-if="customLogo" :src="customLogo" class="w-32 h-32 mb-4 object-contain">
                <h3 class="header-font text-3xl uppercase font-black tracking-widest">Instrument of Record</h3>
                <div class="w-48 h-1 bg-black mt-2"></div>
            </div>

            <h2 class="text-2xl text-center font-bold uppercase mb-10 py-4 bg-zinc-50 border-y border-zinc-200">{{ selectedTemplate.name }}</h2>

            <div class="text-xl leading-relaxed text-justify mb-24 whitespace-pre-line">
                {{ processedBody }}
            </div>

            <div class="grid grid-cols-2 gap-20 pt-16 border-t-2 border-zinc-200 relative">
                <div class="text-center">
                    <div class="sig-font text-5xl py-2 h-16 text-blue-900">{{ formData['Primary_Signer'] }}</div>
                    <div class="border-t-2 border-black pt-2 font-bold uppercase text-xs">{{ formData['Primary_Signer'] || 'Authorized Signature' }}</div>
                </div>
                <div class="text-center">
                    <div class="sig-font text-5xl py-2 h-16 text-blue-900 opacity-80">{{ formData['Witness_Signer'] }}</div>
                    <div class="border-t-2 border-black pt-2 font-bold uppercase text-xs">{{ formData['Witness_Signer'] || 'Witness Signature' }}</div>
                </div>
                <div class="absolute left-1/2 top-0 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full border-4 border-double border-red-800/40 flex items-center justify-center text-center -rotate-12 bg-white">
                    <span class="header-font text-[9px] font-black text-red-800/60 uppercase">Certified<br>Record</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
const { jsPDF } = window.jspdf;

createApp({
    data() {
        return {
            customLogo: null,
            selectedTemplate: null,
            formData: { Primary_Signer: '', Witness_Signer: '' },
            templates: [
                {
                    name: "Irrevocable Private Trust Indenture",
                    fields: ["Settlor_Name", "Trustee_Name", "Trust_Name", "Asset_Details", "Primary_Signer", "Witness_Signer"],
                    body: `This INDENTURE OF TRUST is established by {{Settlor_Name}} as Settlor and {{Trustee_Name}} as Trustee for the {{Trust_Name}}.\n\nThe Settlor hereby transfers {{Asset_Details}} to the Trust. This Trust is irrevocable and the assets are held for the benefit of the beneficiaries as defined in the private ledger. The Trustee has full authority to manage and protect the trust property under the common law.`
                },
                {
                    name: "Commercial Lien & Claim",
                    fields: ["Debtor_Name", "Claimant_Name", "Lien_Amount", "Basis_of_Claim", "Primary_Signer", "Witness_Signer"],
                    body: `NOTICE TO THE PRINCIPAL IS NOTICE TO THE AGENT. A commercial lien is hereby placed against {{Debtor_Name}} by the Claimant, {{Claimant_Name}}, for the amount of {{Lien_Amount}}.\n\nThis claim arises from the following: {{Basis_of_Claim}}. This document serves as a verified affidavit of truth. Failure to rebut this claim point-for-point within 30 days shall constitute an admission of fault and a final judgment in commerce.`
                }
            ]
        }
    },
    created() { this.selectedTemplate = this.templates[0]; },
    computed: {
        processedBody() {
            let text = this.selectedTemplate.body;
            this.selectedTemplate.fields.forEach(f => {
                text = text.replace(new RegExp(`{{${f}}}`, 'g'), this.formData[f] || `[ ${f.replace(/_/g, ' ')} ]`);
            });
            return text;
        }
    },
    methods: {
        handleLogoUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (f) => { this.customLogo = f.target.result; };
            reader.readAsDataURL(file);
        },
        generatePDF() {
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            
            // 1. Red Margin line (Visual only)
            doc.setDrawColor(180, 0, 0); doc.setLineWidth(0.5); doc.line(25, 15, 25, 282); 

            // 2. Header
            if (this.customLogo) doc.addImage(this.customLogo, 'PNG', 85, 15, 40, 40);
            doc.setFont("times", "bold"); doc.setFontSize(26); doc.text("INSTRUMENT OF RECORD", 105, 65, { align: "center" });
            doc.setLineWidth(1); doc.line(70, 68, 140, 68);

            // 3. Document Name
            doc.setFontSize(16); doc.text(this.selectedTemplate.name.toUpperCase(), 105, 82, { align: "center" });

            // 4. Body Text (The Fix: Large, Justified, and Clear of the Red line)
            doc.setFont("times", "normal"); doc.setFontSize(14); // BIGGER FONT
            const splitText = doc.splitTextToSize(this.processedBody, 150); 
            doc.text(splitText, 35, 100, { align: 'justify', lineHeightFactor: 1.5 });

            // 5. Signature Section
            const sigY = 245;
            doc.setDrawColor(0); doc.setLineWidth(0.5);
            
            // Primary
            doc.setTextColor(0, 0, 128); doc.setFont("times", "italic"); doc.setFontSize(24);
            doc.text(this.formData.Primary_Signer || "", 35, sigY);
            doc.line(35, sigY + 2, 95, sigY + 2);
            doc.setTextColor(0); doc.setFont("times", "bold"); doc.setFontSize(9);
            doc.text("PRIMARY DECLARANT", 35, sigY + 7);

            // Witness
            doc.setTextColor(0, 0, 128); doc.setFont("times", "italic"); doc.setFontSize(24);
            doc.text(this.formData.Witness_Signer || "", 115, sigY);
            doc.line(115, sigY + 2, 175, sigY + 2);
            doc.setTextColor(0); doc.setFont("times", "bold"); doc.setFontSize(9);
            doc.text("ATTESTING WITNESS", 115, sigY + 7);

            // 6. Seal
            doc.setDrawColor(150, 0, 0); doc.setLineWidth(1); doc.circle(105, sigY - 5, 15);
            doc.setFontSize(6); doc.setTextColor(150, 0, 0);
            doc.text("OFFICIAL SEAL", 105, sigY - 5, {align: "center"});

            doc.save("Perfect_Instrument.pdf");
        }
    }
}).mount('#app');
</script>
</body>
</html>
