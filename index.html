<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex Supreme - Final Sovereign Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        .sig-font { font-family: 'Dancing Script', cursive; }
        .header-font { font-family: 'Cinzel', serif; }
        .body-font { font-family: 'Libre Baskerville', serif; }
        .paper-bond { background-color: #fcfcf9; background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png"); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f0f12] min-h-screen p-4 body-font text-slate-300">

<div id="app" class="max-w-[1800px] mx-auto grid lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 bg-[#1a1a1e] p-8 rounded-3xl shadow-2xl h-[94vh] overflow-y-auto border border-white/5 custom-scrollbar">
        <h1 class="header-font text-3xl text-amber-500 mb-2 font-black">LEX SUPREME</h1>
        <p class="text-[9px] uppercase tracking-[0.5em] text-slate-500 mb-8 font-bold">Advanced Instrument Generator</p>
        
        <div class="space-y-6">
            <section class="p-4 bg-zinc-900 border-2 border-dashed border-amber-500/20 rounded-2xl text-center">
                <input type="file" @change="handleLogoUpload" class="hidden" id="logoUpload" accept="image/*">
                <label for="logoUpload" class="cursor-pointer text-amber-500 text-[10px] font-bold uppercase tracking-widest">
                    {{ customLogo ? 'Change Official Crest' : 'Upload Authority Seal' }}
                </label>
            </section>

            <section>
                <label class="block text-[10px] font-black uppercase text-amber-500 mb-2">Select Template</label>
                <select v-model="selectedTemplate" class="w-full p-4 bg-zinc-800 border border-zinc-700 rounded-xl text-white outline-none">
                    <option v-for="t in templates" :value="t">{{ t.name }}</option>
                </select>
            </section>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <div v-for="field in selectedTemplate.fields" :key="field">
                    <label class="block text-[9px] font-black text-slate-500 uppercase mb-1">{{ field.replace(/_/g, ' ') }}</label>
                    <input type="text" v-model="formData[field]" class="w-full p-3 bg-zinc-800 border border-zinc-700 rounded-xl text-white outline-none focus:border-amber-500">
                </div>
            </div>

            <button @click="generatePDF" class="w-full bg-amber-600 hover:bg-amber-500 text-black font-black py-6 rounded-2xl shadow-xl transition-all text-xl header-font uppercase">
                Download Supreme PDF
            </button>
        </div>
    </div>

    <div class="lg:col-span-8 bg-white paper-bond p-16 relative text-black min-h-[1150px] border-[20px] border-zinc-200 overflow-y-auto max-h-[94vh] custom-scrollbar shadow-2xl">
        <div class="flex flex-col items-center mb-10 border-b-4 border-black pb-8 text-center relative z-10">
            <img v-if="customLogo" :src="customLogo" class="w-28 h-28 mb-4 object-contain">
            <h3 class="header-font text-2xl uppercase tracking-widest font-black">Official Record of Authority</h3>
        </div>

        <div v-if="customLogo" class="absolute inset-0 flex items-center justify-center opacity-[0.05] pointer-events-none">
            <img :src="customLogo" class="w-[500px]">
        </div>

        <h2 class="text-2xl text-center font-bold uppercase mb-10 border-y border-zinc-200 py-4">{{ selectedTemplate.name }}</h2>

        <div class="text-lg leading-[2.1] text-justify mb-20 px-10 whitespace-pre-line border-l-4 border-red-800/20">
            {{ processedBody }}
        </div>

        <div class="grid grid-cols-2 gap-20 border-t-2 border-black pt-10">
            <div>
                <div class="sig-font text-5xl py-2 h-16 text-blue-900">{{ formData['Primary_Signer'] }}</div>
                <div class="border-t border-black pt-1 font-bold uppercase text-xs">{{ formData['Primary_Signer'] || 'Authorized Party' }}</div>
            </div>
            <div>
                <div class="sig-font text-5xl py-2 h-16 text-blue-900 italic opacity-80">{{ formData['Witness_Signer'] }}</div>
                <div class="border-t border-black pt-1 font-bold uppercase text-xs">{{ formData['Witness_Signer'] || 'Witness Signature' }}</div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;
const { jsPDF } = window.jspdf;

createApp({
    data() {
        return {
            refId: 'LGL-' + Math.random().toString(36).substr(2, 9).toUpperCase(),
            customLogo: null,
            selectedTemplate: null,
            formData: { Primary_Signer: '', Witness_Signer: '' },
            templates: [
                {
                    name: "Commercial Lien & Claim",
                    fields: ["Debtor_Name", "Claimant_Name", "Lien_Amount", "Basis_of_Fault", "Grace_Period", "Primary_Signer", "Witness_Signer"],
                    body: `NOTICE TO THE PRINCIPAL IS NOTICE TO THE AGENT. A commercial lien is hereby placed against {{Debtor_Name}} by the Claimant, {{Claimant_Name}}, for the amount of {{Lien_Amount}}.\n\nThis claim arises from the following breach: {{Basis_of_Fault}}. This document serves as a verified affidavit of truth. Failure to rebut this claim point-for-point within {{Grace_Period}} shall constitute an admission of fault and a final judgment in commerce.\n\nAll property, both real and personal, of the Debtor is hereby encumbered until this debt is satisfied in full. The Claimant reserves all rights under the Uniform Commercial Code and International Maritime Law.`
                },
                {
                    name: "Affidavit of Life & Sovereignty",
                    fields: ["Declarant_Name", "Birth_Date", "Domicile", "Nationality", "Primary_Signer", "Witness_Signer"],
                    body: `I, {{Declarant_Name}}, a living soul born on {{Birth_Date}}, do hereby declare my absolute standing as a sovereign individual.\n\nI establish my domicile at {{Domicile}} and hereby revoke any and all prior signatures or registrations entered into through non-disclosure. I claim the status of {{Nationality}} and declare that this instrument serves as a public record of my lawful status and autonomy. I am not a person, corporation, or legal fiction.`
                },
                {
                    name: "Absolute Bill of Sale (Real Property)",
                    fields: ["Seller_Name", "Buyer_Name", "Property_Description", "Sale_Price", "Primary_Signer", "Witness_Signer"],
                    body: `For the consideration of {{Sale_Price}}, the receipt of which is acknowledged, {{Seller_Name}} (Seller) hereby sells and conveys to {{Buyer_Name}} (Buyer) the following property: {{Property_Description}}.\n\nThe Seller warrants that they are the lawful owner and have the right to sell the property. This transfer is absolute and includes all rights, titles, and interests. The Buyer shall hold the property free and clear of all liens and encumbrances.`
                },
                {
                    name: "Irrevocable Private Trust Indenture",
                    fields: ["Settlor_Name", "Trustee_Name", "Trust_Name", "Asset_Description", "Primary_Signer", "Witness_Signer"],
                    body: `This Trust is established by {{Settlor_Name}} as Settlor and {{Trustee_Name}} as Trustee for the {{Trust_Name}}.\n\nThe Settlor hereby transfers {{Asset_Description}} to the Trust. This Trust is irrevocable and the assets are held for the benefit of the beneficiaries as defined in the private ledger. The Trustee has full authority to manage and protect the trust property under the common law.`
                },
                {
                    name: "Notice of Cease and Desist",
                    fields: ["Recipient_Name", "Action_To_Stop", "Legal_Basis", "Deadline_Date", "Primary_Signer", "Witness_Signer"],
                    body: `This is a formal Notice to {{Recipient_Name}} to immediately CEASE AND DESIST from {{Action_To_Stop}}.\n\nYour actions are in violation of {{Legal_Basis}}. Failure to comply by {{Deadline_Date}} will result in immediate legal action, including but not limited to the filing of a commercial lien and claims for damages. Consider this your final warning.`
                },
                {
                    name: "Power of Attorney (Durable)",
                    fields: ["Principal_Name", "Agent_Name", "Powers_Granted", "Effective_Date", "Primary_Signer", "Witness_Signer"],
                    body: `I, {{Principal_Name}}, appoint {{Agent_Name}} as my Attorney-in-Fact starting {{Effective_Date}}.\n\nMy Agent shall have the power to: {{Powers_Granted}}. This power of attorney is durable and shall not be affected by my subsequent disability or incapacity. All acts done by my Agent shall bind me and my heirs.`
                },
                {
                    name: "Certificate of Natural Birth",
                    fields: ["Child_Name", "Parent_A", "Parent_B", "Location_of_Birth", "Primary_Signer", "Witness_Signer"],
                    body: `This is to certify the natural birth of {{Child_Name}} to parents {{Parent_A}} and {{Parent_B}} at {{Location_of_Birth}}.\n\nThis record is a private claim of origin and does not constitute a registration with any corporate state entity. The child is born a free sovereign individual with all inherent rights.`
                },
                {
                    name: "Promissory Note & Debt Bond",
                    fields: ["Debtor_Name", "Creditor_Name", "Principal_Amount", "Maturity_Date", "Primary_Signer", "Witness_Signer"],
                    body: `For value received, {{Debtor_Name}} promises to pay to {{Creditor_Name}} the sum of {{Principal_Amount}} on or before {{Maturity_Date}}.\n\nThis note is secured by the assets of the Debtor. In the event of default, the Creditor may exercise all remedies available under the law. This is a negotiable instrument.`
                },
                {
                    name: "Release of All Liability",
                    fields: ["Releasor_Name", "Releasee_Name", "Incident_Description", "Payment_Amount", "Primary_Signer", "Witness_Signer"],
                    body: `In consideration of {{Payment_Amount}}, {{Releasor_Name}} hereby releases {{Releasee_Name}} from any and all liability related to {{Incident_Description}}.\n\nThis release is final and binding. The Releasor agrees not to pursue any further claims or legal actions against the Releasee regarding this matter.`
                },
                {
                    name: "Admiralty Maritime Protest",
                    fields: ["Vessel_Name", "Master_Name", "Incident_Details", "Port_of_Entry", "Primary_Signer", "Witness_Signer"],
                    body: `I, {{Master_Name}}, Master of the Vessel {{Vessel_Name}}, hereby enter this formal protest regarding {{Incident_Details}} at {{Port_of_Entry}}.\n\nThis protest is made to protect the interests of the owners, underwriters, and all parties concerned. I reserve the right to extend this protest at a later time and place.`
                }
            ]
        }
    },
    created() { this.selectedTemplate = this.templates[0]; },
    computed: {
        processedBody() {
            let text = this.selectedTemplate.body;
            this.selectedTemplate.fields.forEach(f => {
                text = text.replace(new RegExp(`{{${f}}}`, 'g'), this.formData[f] || `[ ${f.replace(/_/g, ' ')} ]`);
            });
            return text;
        }
    },
    methods: {
        handleLogoUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (f) => { this.customLogo = f.target.result; };
            reader.readAsDataURL(file);
        },
        generatePDF() {
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            const margin = 25;
            const contentWidth = 160;
            let currentY = 70;

            const addPageArt = (d) => {
                d.setFillColor(252, 252, 249); d.rect(0, 0, 210, 297, 'F'); // Background
                d.setDrawColor(180, 0, 0); d.setLineWidth(0.5); d.line(20, 10, 20, 287); // Red Margin
                if (this.customLogo) {
                    d.setGState(new d.GState({opacity: 0.05}));
                    d.addImage(this.customLogo, 'PNG', 45, 80, 120, 120);
                    d.setGState(new d.GState({opacity: 1}));
                }
            };

            addPageArt(doc);
            if (this.customLogo) doc.addImage(this.customLogo, 'PNG', 90, 15, 30, 30);
            doc.setFont("times", "bold"); doc.setFontSize(22);
            doc.text(this.selectedTemplate.name.toUpperCase(), 105, 55, { align: "center" });

            doc.setFont("times", "normal"); doc.setFontSize(12);
            const lines = doc.splitTextToSize(this.processedBody, contentWidth);
            
            lines.forEach(line => {
                if (currentY > 260) {
                    doc.addPage();
                    addPageArt(doc);
                    currentY = 30;
                }
                doc.text(line, margin, currentY);
                currentY += 8;
            });

            if (currentY > 230) { doc.addPage(); addPageArt(doc); currentY = 40; }
            
            const sigY = 245;
            doc.setTextColor(0, 0, 128); doc.setFont("times", "italic"); doc.setFontSize(24);
            doc.text(this.formData.Primary_Signer || "", 25, sigY);
            doc.text(this.formData.Witness_Signer || "", 115, sigY);
            doc.setDrawColor(0); doc.line(25, sigY+2, 90, sigY+2); doc.line(115, sigY+2, 185, sigY+2);
            doc.setTextColor(150, 0, 0); doc.circle(105, 250, 18);

            doc.save(`${this.selectedTemplate.name}.pdf`);
        }
    }
}).mount('#app');
</script>
</body>
</html>
